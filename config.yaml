# OpenBot Configuration
# Environment variables override these values.
# API keys should be set via .env or environment variables, NOT here.

model:
  primary:
    provider: openai_compatible
    model: kimi-k2.5
    base_url: https://ark.cn-beijing.volces.com/api/coding/v3
    max_tokens: 4096
    temperature: 0.7
    # Pricing per 1M tokens (for cost tracking, set 0 if unknown)
    pricing_input: 0.6
    pricing_output: 3
  # fallback:
  #   provider: anthropic
  #   model: claude-sonnet-4-20250514
  #   max_tokens: 4096
  max_retries: 3

telegram:
  mode: polling
  # allowed_user_ids: []  # Empty = allow all, set IDs to restrict access

storage:
  db_path: data/openbot.db

log:
  level: INFO
  format: console  # console | json

agent:
  max_iterations: 10
  token_budget: 8000
