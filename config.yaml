# OpenBot Configuration
# Secrets (API keys, tokens) go in .env, referenced here by env var name.
# All other settings go directly in this file.

model:
  primary:
    provider: openai_compatible
    model: kimi-k2.5
    base_url: https://ark.cn-beijing.volces.com/api/coding/v3
    api_key_env: ARK_API_KEY          # reads from .env: ARK_API_KEY=xxx
    max_tokens: 4096
    temperature: 0.7
    pricing_input: 0.6                # per 1M tokens
    pricing_output: 3
    connect_timeout: 30
    read_timeout: 600
  fallback:
    provider: openai_compatible
    model: glm-5
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api_key_env: DASHSCOPE_API_KEY
    max_tokens: 4096
  max_retries: 3

telegram:
  mode: polling
  bot_token_env: TELEGRAM_BOT_TOKEN   # reads from .env: TELEGRAM_BOT_TOKEN=xxx
  enable_streaming: false
  # allowed_user_ids: []  # Empty = allow all, set IDs to restrict access

storage:
  db_path: data/openbot.db
  workspace_path: ~/Project/openbot

log:
  level: INFO
  format: console  # console | json

agent:
  max_iterations: 50
  task_timeout: 0                        # total seconds per task (0 = no limit)
  tool_timeout: 120                      # max seconds per tool call (0 = no limit)
  max_task_cost: 0                       # max dollars per task (0 = no limit)
  stuck_detection_threshold: 3           # consecutive identical tool calls = stuck
  token_budget: 8000

embedding:
  enabled: true                        # set to true to enable vector search
  provider: dashscope                  # dashscope native SDK (required for VL models)
  model: qwen3-vl-embedding
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  api_key_env: DASHSCOPE_API_KEY
  dimensions: 1536

reranker:
  enabled: true                        # set to true to enable reranking
  model: Qwen/Qwen3-Reranker-4B
  base_url: https://api.siliconflow.cn/v1
  api_key_env: SILICONFLOW_API_KEY
  top_n: 5
