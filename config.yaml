# OpenBot Configuration
# Secrets (API keys, tokens) go in .env, referenced here by env var name.
# All other settings go directly in this file.

model:
  primary:
    provider: openai_compatible
    model: kimi-k2.5
    base_url: https://ark.cn-beijing.volces.com/api/coding/v3
    api_key_env: ARK_API_KEY          # reads from .env: ARK_API_KEY=xxx
    max_tokens: 4096
    temperature: 0.7
    pricing_input: 0.6                # per 1M tokens
    pricing_output: 3
  fallback:
    provider: openai_compatible
    model: glm-4.7
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api_key_env: DASHSCOPE_API_KEY
    max_tokens: 4096
  max_retries: 3

telegram:
  mode: polling
  bot_token_env: TELEGRAM_BOT_TOKEN   # reads from .env: TELEGRAM_BOT_TOKEN=xxx
  # allowed_user_ids: []  # Empty = allow all, set IDs to restrict access

storage:
  db_path: data/openbot.db

log:
  level: INFO
  format: console  # console | json

agent:
  max_iterations: 10
  token_budget: 8000

embedding:
  enabled: false                        # set to true to enable vector search
  model: text-embedding-v3
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  api_key_env: DASHSCOPE_API_KEY
  dimensions: 1024
